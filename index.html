<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="완독 독서동호회 랜덤 질문 뽑기" />
    <title>완독 랜덤 질문</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro" aria-labelledby="app-title">
        <p class="club-name">독서동호회 완독</p>
        <h1 id="app-title">오늘의 랜덤 질문 📚</h1>
        <p class="intro-copy">책의 종류를 고르면 공통 질문과 장르별 질문 중 하나를 골라드립니다.</p>
      </section>

      <section class="picker" aria-label="책 종류 선택">
        <div class="genre-grid" id="genreGrid"></div>
      </section>

      <section class="question-panel" aria-live="polite">
        <div class="question-meta">
          <span id="selectedGenre">책 종류를 선택해주세요</span>
          <span id="questionPool">공통 질문 포함</span>
        </div>
        <p class="question-text" id="questionText">오늘 읽은 책에 맞는 버튼을 누르면 질문이 나타납니다.</p>
        <div class="panel-actions">
          <button class="secondary-button" id="copyButton" type="button" disabled>질문 복사</button>
          <button class="primary-button" id="rerollButton" type="button" disabled>다시 뽑기</button>
        </div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <div class="history-head">
          <h2 id="history-title">오늘 뽑은 질문</h2>
          <button class="text-button" id="clearHistoryButton" type="button">비우기</button>
        </div>
        <ol id="historyList" class="history-list">
          <li class="empty-history">아직 뽑은 질문이 없습니다.</li>
        </ol>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
